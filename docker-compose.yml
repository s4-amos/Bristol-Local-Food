services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bristol_food
      POSTGRES_USER: bristol_user
      POSTGRES_PASSWORD: bristol_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://bristol_user:bristol_pass@db:5432/bristol_food

volumes:
  postgres_data: