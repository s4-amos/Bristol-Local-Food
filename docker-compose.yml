services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bristol
      POSTGRES_USER: bristol
      POSTGRES_PASSWORD: bristolpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    depends_on:
      - db
    environment:
      DJANGO_ALLOWED_HOSTS: "localhost 127.0.0.1"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: bristol
      POSTGRES_USER: bristol
      POSTGRES_PASSWORD: bristolpass
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata: